<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login - Mentoring Monitor</title>
  <link rel="stylesheet" href="assets/style.css"/>
  <style>
    body {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: #f3f4f6;
    }
    .login-box {
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.08);
      padding: 40px;
      width: 100%;
      max-width: 380px;
    }
    .login-logo {
      text-align: center;
      margin-bottom: 28px;
    }
    .login-logo .icon { font-size: 36px; }
    .login-logo h1 {
      font-size: 18px;
      margin-top: 8px;
    }
    .login-error {
      background: #fee2e2;
      color: #b91c1c;
      padding: 10px 14px;
      border-radius: 8px;
      font-size: 14px;
      margin-bottom: 16px;
      display: none;
    }
  </style>
</head>
<body>
  <div class="login-box">
    <div class="login-logo">
      <div class="icon">🕌</div>
      <h1>Mentoring Monitor</h1>
    </div>

    <div id="loginError" class="login-error"></div>

    <form id="loginForm">
      <div class="form-group">
        <label>Email</label>
        <input type="email" name="email" required placeholder="admin@example.com" autocomplete="username"/>
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" name="password" required placeholder="••••••••" autocomplete="current-password"/>
      </div>
      <button type="submit" class="btn" style="width:100%; margin-top:8px;" id="loginBtn">Masuk</button>
    </form>
  </div>

  <script type="module" src="assets/login.js"></script>
</body>
</html>
